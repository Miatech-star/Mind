<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mia — Your mind, mapped</title>
<meta property="og:title" content="Mia — Your mind, mapped">
<meta property="og:description" content="Talk to Mia. See what's really going on inside.">
<link rel="icon" href="/favicon.png" type="image/png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
@font-face{font-family:'Utopia Std Display';src:url('/fonts/UtopiaStdDisplay.woff2') format('woff2');font-weight:400;font-style:normal;font-display:swap}
@font-face{font-family:'Utopia Std Display';src:url('/fonts/UtopiaStdDisplay-Italic.woff2') format('woff2');font-weight:400;font-style:italic;font-display:swap}

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f5f3f0;
  --fg:#000;
  --muted:rgba(100,80,120,.45);
  --ft:'Utopia Std Display','Palatino Linotype','Book Antiqua',Georgia,serif;
  --fb:'Inter',system-ui,-apple-system,sans-serif;
}
html,body{width:100%;height:100%;background:transparent;font-family:var(--fb);color:var(--fg);-webkit-font-smoothing:antialiased;overflow:hidden}

/* ── Spline background ── */
#spline-bg{position:fixed;inset:0;z-index:0;overflow:hidden;opacity:.8}
#spline-bg iframe{width:100%;height:100%;border:none}
#spline-bg .cover{position:absolute;bottom:0;z-index:2;height:80px;background:#f5f3f0}
#spline-bg .cover-l{left:0;width:350px}
#spline-bg .cover-r{right:0;width:350px}

/* ── Layout ── */
.page{
  position:relative;z-index:1;
  min-height:100vh;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:40px 24px;
  text-align:center;
  background:transparent;
  pointer-events:none;
}

.title{
  font-family:var(--ft);
  font-size:clamp(34px,6vw,58px);
  font-weight:400;
  font-style:italic;
  letter-spacing:-0.03em;
  color:var(--fg);
  margin-bottom:12px;
  line-height:1.1;
}

.subtitle{
  font-family:var(--fb);
  font-size:14px;
  font-weight:400;
  letter-spacing:-0.03em;
  color:rgba(0,0,0,.7);
  margin-bottom:28px;
  max-width:380px;
  line-height:1.5;
}

.btn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  padding:12px 20px;
  background:#000;
  color:#fff;
  border:none;
  border-radius:100px;
  font-family:var(--fb);
  font-size:14px;
  font-weight:600;
  letter-spacing:-0.03em;
  text-decoration:none;
  cursor:pointer;
  pointer-events:auto;
  transition:transform .2s ease,box-shadow .2s ease;
  box-shadow:0 6px 30px rgba(0,0,0,.15);
}
.btn:hover{transform:translateY(-2px);box-shadow:0 10px 40px rgba(0,0,0,.22)}
.btn:active{transform:translateY(0)}

.link{
  display:inline-block;
  margin-top:14px;
  font-family:var(--fb);
  font-size:14px;
  font-weight:700;
  letter-spacing:-0.03em;
  color:var(--fg);
  opacity:.5;
  text-decoration:underline;
  text-underline-offset:4px;
  text-decoration-thickness:1px;
  pointer-events:auto;
  transition:opacity .2s ease;
}
.link:hover{opacity:.35}
</style>
</head>
<body>

<div id="spline-bg">
  <iframe src='https://my.spline.design/miaiicopy-81yJeISAaR3fducIVXs41NZ5/' loading='lazy'></iframe>
  <div class="cover cover-l"></div>
  <div class="cover cover-r"></div>
</div>

<div class="page">
  <h1 class="title">Welcome to Mia</h1>
  <p class="subtitle"><strong>Find your patterns and build healthy relationships.</strong></p>
  <a class="btn" href="https://chatgpt.com/g/g-l38NcMokB-mia-ai-your-friend-and-self-discovery-coach" target="_blank" rel="noopener">Talk to Mia</a>
</div>

</body>
</html>
