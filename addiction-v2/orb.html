<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orb</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{
  width:100%;height:100%;
  background:transparent;
  overflow:hidden;
  display:flex;align-items:center;justify-content:center;
  /* Orb is purely decorative — no interaction is allowed. */
  pointer-events:none;
  user-select:none;
  -webkit-user-select:none;
  touch-action:none;
}
#wrap{
  position:relative;
  width:100%;height:100%;
  display:flex;align-items:center;justify-content:center;
  /* Grow-in: starts hidden + tiny, then expands from center over ~2s. */
  transform: scale(0.04);
  opacity: 0;
  transform-origin: center center;
  transition:
    transform 2200ms cubic-bezier(.16, 1, .30, 1),
    opacity 1400ms cubic-bezier(.4, 0, .2, 1);
  will-change: transform, opacity;
}
#wrap.is-grown{
  transform: scale(1);
  opacity: 1;
}
/* Reduced blur — the orb reads sharper now, more like the Figma. */
canvas{display:block;position:absolute;filter:blur(7px);pointer-events:none;}
#aura{
  position:absolute;pointer-events:none;
  width:74.4vmin;height:74.4vmin;border-radius:50%;
  background:radial-gradient(circle at 50% 50%,
    transparent 28%,
    rgba(255,252,252,.28) 42%,
    rgba(255,250,250,.72) 54%,
    rgba(255,255,255,.92) 62%,
    rgba(255,253,253,.58) 72%,
    rgba(255,250,250,.20) 84%,
    transparent 100%);
  filter:blur(8px);
}
@media (prefers-reduced-motion: reduce) {
  #wrap { transition: opacity 400ms linear; transform: scale(1); }
}
</style>
</head>
<body>
<div id="wrap">
  <div id="aura"></div>
</div>

<script type="importmap">{"imports":{"three":"https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.module.js"}}</script>
<script type="module">
import * as THREE from 'three';

// ── Renderer ──────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0, 0);
document.getElementById('wrap').appendChild(renderer.domElement);

const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 100);
camera.position.set(0, 0, 3.8);

// ── Simplex noise GLSL ────────────────────────────────────────
const NOISE = `
vec3 mod289v3(vec3 x){return x-floor(x*(1./289.))*289.;}
vec4 mod289v4(vec4 x){return x-floor(x*(1./289.))*289.;}
vec4 permute(vec4 x){return mod289v4(((x*34.)+1.)*x);}
vec4 taylorInvSqrt(vec4 r){return 1.79284291400159-0.85373472095314*r;}
float snoise(vec3 v){
  const vec2 C=vec2(1./6.,1./3.);const vec4 D=vec4(0.,.5,1.,2.);
  vec3 i=floor(v+dot(v,C.yyy));vec3 x0=v-i+dot(i,C.xxx);
  vec3 g=step(x0.yzx,x0.xyz);vec3 l=1.-g;
  vec3 i1=min(g.xyz,l.zxy);vec3 i2=max(g.xyz,l.zxy);
  vec3 x1=x0-i1+C.xxx;vec3 x2=x0-i2+C.yyy;vec3 x3=x0-D.yyy;
  i=mod289v3(i);
  vec4 p=permute(permute(permute(i.z+vec4(0.,i1.z,i2.z,1.))+i.y+vec4(0.,i1.y,i2.y,1.))+i.x+vec4(0.,i1.x,i2.x,1.));
  float n_=0.142857142857;vec3 ns=n_*D.wyz-D.xzx;
  vec4 j=p-49.*floor(p*ns.z*ns.z);vec4 x_=floor(j*ns.z);vec4 y_=floor(j-7.*x_);
  vec4 x=x_*ns.x+ns.yyyy;vec4 y=y_*ns.x+ns.yyyy;vec4 h=1.-abs(x)-abs(y);
  vec4 b0=vec4(x.xy,y.xy);vec4 b1=vec4(x.zw,y.zw);
  vec4 s0=floor(b0)*2.+1.;vec4 s1=floor(b1)*2.+1.;vec4 sh=-step(h,vec4(0.));
  vec4 a0=b0.xzyw+s0.xzyw*sh.xxyy;vec4 a1=b1.xzyw+s1.xzyw*sh.zzww;
  vec3 p0=vec3(a0.xy,h.x);vec3 p1=vec3(a0.zw,h.y);vec3 p2=vec3(a1.xy,h.z);vec3 p3=vec3(a1.zw,h.w);
  vec4 norm=taylorInvSqrt(vec4(dot(p0,p0),dot(p1,p1),dot(p2,p2),dot(p3,p3)));
  p0*=norm.x;p1*=norm.y;p2*=norm.z;p3*=norm.w;
  vec4 m=max(.6-vec4(dot(x0,x0),dot(x1,x1),dot(x2,x2),dot(x3,x3)),0.);m=m*m;
  return 42.*dot(m*m,vec4(dot(p0,x0),dot(p1,x1),dot(p2,x2),dot(p3,x3)));
}
float fbm(vec3 p){
  float v=0.,a=.5;
  for(int i=0;i<5;i++){v+=snoise(p)*a;p*=2.1;a*=.5;}
  return v;
}`;

const vert = `
  varying vec3 vNormal;
  varying vec3 vWorldPos;
  void main(){
    vNormal   = normalize(normalMatrix * normal);
    vWorldPos = (modelMatrix * vec4(position, 1.)).xyz;
    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.);
  }`;

// ── Core orb shader ───────────────────────────────────────────
const coreF = `${NOISE}
  uniform float uTime;
  uniform vec3  uCamPos;
  varying vec3  vNormal;
  varying vec3  vWorldPos;
  void main(){
    vec3 view    = normalize(uCamPos - vWorldPos);
    float ndv    = max(dot(vNormal, view), 0.0);
    float fresnel= 1.0 - ndv;

    vec3 np1 = vWorldPos*1.7 + vec3(uTime*.16, uTime*.11, uTime*.09);
    vec3 np2 = vWorldPos*3.2 + vec3(-uTime*.09, uTime*.14, -uTime*.12);
    float n  = clamp(fbm(np1)*.6 + fbm(np2)*.4, -1., 1.) * .5 + .5;

    vec3 cDeep  = vec3(.72, .38, .42);
    vec3 cRose  = vec3(.84, .54, .56);
    vec3 cPink  = vec3(.95, .72, .73);
    vec3 cLight = vec3(1.0, .94, .94);

    vec3 col;
    if     (n < .35) col = mix(cDeep,  cRose,  n/.35);
    else if(n < .65) col = mix(cRose,  cPink, (n-.35)/.30);
    else             col = mix(cPink,  cLight,(n-.65)/.35);

    col = mix(col, vec3(1., .97, .97), pow(fresnel, 1.2) * .88);
    float alpha = 1.0 - pow(fresnel, 3.) * .14;
    gl_FragColor = vec4(col, alpha);
  }`;

// ── Halo shader ───────────────────────────────────────────────
const haloF = `${NOISE}
  uniform float uTime;
  uniform float uIdx;
  uniform vec3  uCamPos;
  varying vec3  vNormal;
  varying vec3  vWorldPos;
  void main(){
    vec3 view  = normalize(uCamPos - vWorldPos);
    float ndv  = max(dot(vNormal, view), 0.0);
    float fr   = pow(1.0 - ndv, 2.4);
    float n    = fbm(vWorldPos*1.5 + uTime*.04) * .5 + .5;
    vec3  col  = mix(vec3(.94,.75,.76), vec3(1.,.96,.96), n);
    float alpha= fr * max(0., .28 - uIdx*.052);
    gl_FragColor = vec4(col, alpha);
  }`;

// ── Geometry ──────────────────────────────────────────────────
function smat(fs, u, ex={}){
  return new THREE.ShaderMaterial({
    vertexShader:vert, fragmentShader:fs, uniforms:u,
    transparent:true, depthWrite:false, ...ex
  });
}

const orb = new THREE.Mesh(
  new THREE.SphereGeometry(1, 256, 256),
  smat(coreF, { uTime:{value:0}, uCamPos:{value:camera.position} })
);
scene.add(orb);

const haloScales = [1.10, 1.28, 1.55, 1.90];
const halos = haloScales.map((s, i) => {
  const m = new THREE.Mesh(
    new THREE.SphereGeometry(1, 64, 64),
    smat(haloF, { uTime:{value:0}, uIdx:{value:i}, uCamPos:{value:camera.position} })
  );
  m.scale.setScalar(s);
  scene.add(m);
  return m;
});

// ── Auto rotation only — no user interaction ────────────────
// All drag/touch/wheel listeners removed; the orb auto-rotates and
// drifts via fixed values in the animate loop below. Camera Z is
// pinned to its starting value (no zoom).
let rotX = 0, rotY = 0;
let autoY = 0;
const camZ = 3.8;
const auraEl = document.getElementById('aura');

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Trigger the grow-in animation on the next paint — gives the orb a
// natural "appears from center" entrance that the parent intro screen
// uses as the first ~2 seconds of the experience.
const wrapEl = document.getElementById('wrap');
requestAnimationFrame(() => requestAnimationFrame(() => wrapEl.classList.add('is-grown')));

// ── Animate ───────────────────────────────────────────────────
const clock = new THREE.Clock();

function animate(){
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  autoY += 0.004;
  const breath = 1.0 + Math.sin(t*.55)*.013 + Math.sin(t*.91)*.006;

  const rx = rotX + Math.sin(t*.12)*.018;
  const ry = rotY + autoY;
  orb.rotation.x = rx; orb.rotation.y = ry;
  orb.scale.setScalar(breath);
  halos.forEach((h,i)=>{
    h.rotation.x = rx; h.rotation.y = ry;
    h.scale.setScalar(haloScales[i] * breath);
    h.material.uniforms.uTime.value = t;
  });
  orb.material.uniforms.uTime.value = t;

  // Camera Z is pinned (no zoom). Aura tracks the orb's breath only.
  const sz = (74.4 * breath).toFixed(1);
  auraEl.style.width  = sz + 'vmin';
  auraEl.style.height = sz + 'vmin';

  renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
