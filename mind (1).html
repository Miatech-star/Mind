<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Your Mind Map — Mia</title>
<meta property="og:title" content="Your Mind Map — Mia">
<meta property="og:description" content="A living map of your mind. Built by Mia.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
@font-face{font-family:'Utopia Std Display';src:url('/fonts/UtopiaStdDisplay.woff2') format('woff2');font-weight:400;font-style:normal;font-display:swap}
@font-face{font-family:'Utopia Std Display';src:url('/fonts/UtopiaStdDisplay-Italic.woff2') format('woff2');font-weight:400;font-style:italic;font-display:swap}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f9f7f4;--fg:#2a1048;--fg-soft:rgba(100,40,160,.55);--fg-muted:rgba(140,110,160,.45);--warm:#E07010;--rose:#CC1060;--violet:#8800CC;--glass:rgba(252,250,247,.78);--gb:rgba(160,100,200,.18);--ft:'Utopia Std Display','Palatino Linotype','Book Antiqua',Georgia,serif;--fb:'Inter',system-ui,-apple-system,sans-serif}
html,body{width:100%;height:100%;background:var(--bg);overflow:hidden;font-family:var(--fb);letter-spacing:-0.03em;color:var(--fg);-webkit-font-smoothing:antialiased}
#c{position:fixed;inset:0;display:block;cursor:grab;touch-action:none;z-index:1}#c:active{cursor:grabbing}
#lr{position:fixed;inset:0;pointer-events:none;z-index:8;overflow:hidden}
.lbl{position:absolute;display:inline-flex;align-items:center;gap:6px;padding:5px 12px 5px 8px;background:var(--glass);backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);border:.75px solid var(--gb);border-radius:100px;font-family:var(--fb);font-size:10px;font-weight:500;letter-spacing:-0.03em;color:var(--fg);white-space:nowrap;transform:translate(-50%,-50%);box-shadow:0 2px 18px rgba(120,40,180,.07),0 0 0 .5px rgba(255,255,255,.92) inset;will-change:left,top,opacity;transition:opacity .45s}
.lbl-0{font-size:14px;font-weight:600;padding:9px 20px 9px 13px;border:1px solid rgba(224,112,16,.35);box-shadow:0 4px 24px rgba(224,112,16,.12),0 0 0 .5px rgba(255,255,255,.92) inset}
.lbl-1{font-size:11px;font-weight:600;padding:6px 14px 6px 10px}
.lbl-q{font-size:9.5px;font-style:italic;border:1px solid rgba(136,0,204,.25);background:rgba(250,245,255,.85)}
.lbl-blur{filter:blur(2px);-webkit-filter:blur(2px);user-select:none;pointer-events:none}
.pip{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.pip-0{width:8px;height:8px;background:conic-gradient(from 0deg,#E07010,#CC1060,#8800CC,#E07010);box-shadow:0 0 12px rgba(200,80,20,.6)}
.pip-1{width:6px;height:6px;background:conic-gradient(from 0deg,#E07010,#CC1060,#E07010);box-shadow:0 0 8px rgba(200,60,40,.5)}
.pip-2{background:conic-gradient(from 0deg,#CC1060,#8800CC,#CC1060);box-shadow:0 0 6px rgba(160,20,140,.5)}
.pip-q{background:conic-gradient(from 0deg,#8800CC,#bb44ff,#8800CC);box-shadow:0 0 8px rgba(136,0,204,.55);animation:gp 2.5s ease-in-out infinite}
.pip-s{background:conic-gradient(from 0deg,#44cc88,#88ddaa,#44cc88);box-shadow:0 0 6px rgba(68,204,136,.5)}
@keyframes gp{0%,100%{box-shadow:0 0 6px rgba(136,0,204,.4)}50%{box-shadow:0 0 14px rgba(136,0,204,.65)}}
#nav{position:fixed;top:0;left:0;right:0;z-index:15;padding:72px 30px 22px;display:flex;justify-content:center;align-items:center;pointer-events:none;opacity:0;transition:opacity .8s ease .4s}#nav.show{opacity:1}
.nu{font-family:var(--ft);font-size:28px;font-weight:400;font-style:italic;letter-spacing:-0.03em;color:#000}
#hint{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);font-family:var(--fb);font-size:9.5px;letter-spacing:-0.03em;text-transform:uppercase;color:var(--fg-muted);pointer-events:none;z-index:15;opacity:0;transition:opacity 1.5s}#hint.show{opacity:1}#hint.gone{opacity:0}
#cta{position:fixed;bottom:0;left:0;right:0;z-index:20;display:flex;flex-direction:column;align-items:center;padding:0 24px 32px;opacity:0;transform:translateY(20px);transition:opacity .8s ease 1s,transform .8s ease 1s;pointer-events:none}#cta.show{opacity:1;transform:translateY(0);pointer-events:auto}
.cta-btn{display:inline-flex;align-items:center;justify-content:center;padding:15px 36px;background:#000;color:#fff;border:none;border-radius:100px;font-family:var(--fb);font-size:13px;font-weight:600;letter-spacing:-0.03em;text-decoration:none;cursor:pointer;transition:transform .2s,box-shadow .2s;box-shadow:0 6px 30px rgba(0,0,0,.18)}.cta-btn:hover{transform:translateY(-2px);box-shadow:0 10px 40px rgba(0,0,0,.25)}.cta-btn:active{transform:translateY(0)}
.cta-sub{font-family:var(--fb);font-size:10px;font-weight:400;letter-spacing:-0.03em;text-transform:uppercase;color:var(--fg-muted);margin-top:10px}
#ld{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:100;transition:opacity .7s}#ld.done{opacity:0;pointer-events:none}
.lr{width:34px;height:34px;border-radius:50%;border:1.5px solid rgba(160,80,200,.12);border-top-color:#CC6010;border-right-color:#8800CC;animation:sp 1.1s linear infinite}@keyframes sp{to{transform:rotate(360deg)}}.lt{font-family:var(--fb);font-size:9.5px;font-weight:500;letter-spacing:-0.03em;text-transform:uppercase;color:var(--fg-muted)}
/* Debug strip - REMOVE AFTER TESTING */
#dbg{position:fixed;top:0;left:0;right:0;z-index:999;background:rgba(0,0,0,.85);color:#0f0;font-family:monospace;font-size:10px;padding:6px 10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;pointer-events:none}
</style>
</head>
<body>
<div id="dbg">Loading...</div>
<canvas id="c"></canvas>
<div id="lr"></div>
<div id="nav"><span class="nu" id="nu"></span></div>
<div id="hint">Drag to rotate &middot; Scroll to zoom</div>
<div id="cta">
  <a class="cta-btn" href="https://apps.apple.com/app/apple-store/id6743808070?pt=127721921&ct=Mind%20map&mt=8" target="_blank" rel="noopener">Download Mia app to Unlock your map</a>
  <span class="cta-sub">Your mind runs on patterns — see them all, then change them</span>
</div>
<div id="ld"><div class="lr"></div><span class="lt">Mapping your mind</span></div>
<script>
(function(){

/* ═══════════════════════════════════
   PLACEHOLDERS — filled by URL hash
   Format: #Name~Surface~P1~P2~P3~A~B~C~D~E~F~G~H~I~from.to~from.to
   ═══════════════════════════════════ */

// Default placeholders
var NAME = 'Your';
var LABELS = [
  'Surface Problem',
  'Pattern 1', 'Pattern 2', 'Pattern 3',
  'Deep A', 'Deep B', 'Deep C',
  'Deep D', 'Deep E', 'Deep F',
  'Deep G', 'Deep H', 'Deep I'
];
var XLINKS = [];

// Node structure (fixed — never changes)
var IDS =     ['s',  'p1','p2','p3', 'a', 'b', 'c', 'd', 'e', 'f', 'g', 'h', 'i'];
var PARENTS = [null, 's', 's', 's',  'p1','p1','p1','p2','p2','p2','p3','p3','p3'];
var DEPTHS =  [0,    1,   1,   1,    2,   2,   2,   2,   2,   2,   2,   2,   2  ];
var BLUR =    ['p3','g','h','i','b','d'];

var dbg = document.getElementById('dbg');

// ── STEP 1: Read the URL ──
var hash = '';
var fullUrl = window.location.href;
dbg.textContent = 'URL: ' + fullUrl;

var hashIndex = fullUrl.indexOf('#');
if (hashIndex !== -1) {
  hash = fullUrl.substring(hashIndex + 1);
}

dbg.textContent = 'HASH (' + hash.length + ' chars): ' + hash.substring(0, 80) + '...';

// ── STEP 2: Parse the hash and fill placeholders ──
if (hash && hash.indexOf('~') !== -1) {
  try {
    var decoded = decodeURIComponent(hash);
    var parts = decoded.split('~');

    dbg.textContent = 'PARSED: ' + parts.length + ' fields. [0]=' + parts[0] + ' [1]=' + parts[1];

    if (parts.length >= 14) {
      // Fill name
      NAME = parts[0].replace(/\+/g, ' ');

      // Fill 13 labels
      for (var i = 0; i < 13; i++) {
        LABELS[i] = parts[i + 1].replace(/\+/g, ' ');
      }

      // Fill cross-links (everything after the 14th field that contains a dot)
      XLINKS = [];
      for (var j = 14; j < parts.length; j++) {
        var pair = parts[j].split('.');
        if (pair.length === 2) {
          XLINKS.push({ from: pair[0], to: pair[1] });
        }
      }

      dbg.textContent = 'OK! Name=' + NAME + ' | Surface=' + LABELS[0] + ' | Links=' + XLINKS.length;
    } else {
      dbg.textContent = 'ERROR: Only ' + parts.length + ' fields (need 14+)';
    }
  } catch (e) {
    dbg.textContent = 'PARSE ERROR: ' + e.message;
  }
} else if (hash.length > 0) {
  dbg.textContent = 'NO TILDE in hash. Raw: ' + hash.substring(0, 60);
} else {
  dbg.textContent = 'NO HASH — showing placeholders';
}

// ── STEP 3: Build the node list from filled placeholders ──
var nodes = [];
for (var i = 0; i < 13; i++) {
  var nd = { id: IDS[i], label: LABELS[i], depth: DEPTHS[i] };
  if (PARENTS[i]) nd.parent = PARENTS[i];
  nodes.push(nd);
}

function isBl(id) { for (var i = 0; i < BLUR.length; i++) { if (BLUR[i] === id) return true; } return false; }
function isQ(l) { return l.indexOf('?') >= 0 || l.toLowerCase().indexOf('explore') === 0; }
function isStr(l) { var w = l.toLowerCase(); var kw = ['strength','empathy','creativ','aware','resilien','intellig','deep ','sharp','loyal','courage','wisdom','intuit','honest','adapt','drive','strong']; for (var k = 0; k < kw.length; k++) { if (w.indexOf(kw[k]) >= 0) return true; } return false; }

// ── STEP 4: Load Three.js and render ──
function loadS(u, cb) { var s = document.createElement('script'); s.src = u; s.onload = cb; document.head.appendChild(s); }

loadS('https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js', function () {
loadS('https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js', function () {

  document.getElementById('nu').textContent = NAME + '\u2019s mind';

  var cv = document.getElementById('c');
  var R = new THREE.WebGLRenderer({ canvas: cv, antialias: true, powerPreference: 'high-performance' });
  R.setPixelRatio(Math.min(devicePixelRatio, 2)); R.setSize(innerWidth, innerHeight); R.setClearColor(0xf9f7f4, 1);
  var sc = new THREE.Scene(); sc.background = new THREE.Color(0xf9f7f4);
  var cam = new THREE.PerspectiveCamera(52, innerWidth / innerHeight, 0.05, 300);
  cam.position.set(0, 4, 18); cam.lookAt(0, 0, 0);
  var ct = new THREE.OrbitControls(cam, R.domElement);
  ct.enableDamping = true; ct.dampingFactor = 0.06; ct.autoRotate = true; ct.autoRotateSpeed = 0.35;
  ct.minDistance = 3; ct.maxDistance = 60; ct.rotateSpeed = 0.7; ct.zoomSpeed = 0.8; ct.target.set(0, 0, 0);

  var touched = false;
  R.domElement.addEventListener('pointerdown', function () {
    if (!touched) { touched = true; ct.autoRotate = false; document.getElementById('hint').classList.add('gone'); }
  }, { once: true });

  // Attractor
  var B=.19,DT=.035,WU=900,ST=720,SK=2,NT=400,SC=1.8,CM=8,AO=.08;
  var GR=[{t:0,r:.96,g:.82,b:.05},{t:.1,r:.92,g:.58,b:.04},{t:.22,r:.9,g:.3,b:.07},{t:.34,r:.85,g:.07,b:.38},{t:.48,r:.7,g:.03,b:.72},{t:.62,r:.54,g:.22,b:.88},{t:.76,r:.62,g:.4,b:.9},{t:.88,r:.7,g:.55,b:.92},{t:1,r:.76,g:.65,b:.94}];
  function tC(d){var t=Math.min(1,d/CM);for(var i=0;i<GR.length-1;i++){if(t<=GR[i+1].t){var f=(t-GR[i].t)/(GR[i+1].t-GR[i].t);return{r:GR[i].r+(GR[i+1].r-GR[i].r)*f,g:GR[i].g+(GR[i+1].g-GR[i].g)*f,b:GR[i].b+(GR[i+1].b-GR[i].b)*f}}}var l=GR[GR.length-1];return{r:l.r,g:l.g,b:l.b}}
  function tf(x,y,z){return[Math.sin(y)-B*x,Math.sin(z)-B*y,Math.sin(x)-B*z]}
  function rk4(x,y,z){var h=DT,k1=tf(x,y,z),k2=tf(x+h*.5*k1[0],y+h*.5*k1[1],z+h*.5*k1[2]),k3=tf(x+h*.5*k2[0],y+h*.5*k2[1],z+h*.5*k2[2]),k4=tf(x+h*k3[0],y+h*k3[1],z+h*k3[2]);return[x+h/6*(k1[0]+2*k2[0]+2*k3[0]+k4[0]),y+h/6*(k1[1]+2*k2[1]+2*k3[1]+k4[1]),z+h/6*(k1[2]+2*k2[2]+2*k3[2]+k4[2])]}
  function mkT(x0,y0,z0){var x=x0,y=y0,z=z0,r;for(var i=0;i<WU;i++){r=rk4(x,y,z);x=r[0];y=r[1];z=r[2]}var p=[];for(var i=0;i<ST;i++){r=rk4(x,y,z);x=r[0];y=r[1];z=r[2];if(i%SK===0)p.push([x*SC,y*SC,z*SC])}return p}
  function mkSd(i){var th=(i/NT)*Math.PI*2,ph=((i*7)%NT)/NT*Math.PI,r=.03+(i%8)*.055,j=.008;return[r*Math.sin(ph)*Math.cos(th)+(Math.random()-.5)*j,r*Math.sin(ph)*Math.sin(th)+(Math.random()-.5)*j,r*Math.cos(ph)+(Math.random()-.5)*j]}

  var bgG=new THREE.Group(),fgG=new THREE.Group();sc.add(bgG);sc.add(fgG);
  var bgM=new THREE.LineBasicMaterial({vertexColors:true,transparent:true,opacity:AO,blending:THREE.NormalBlending,depthWrite:false});
  for(var ti=0;ti<NT;ti++){var sd=mkSd(ti);var pts=mkT(sd[0],sd[1],sd[2]);if(pts.length<4)continue;var pa=new Float32Array(pts.length*3),ca=new Float32Array(pts.length*3);for(var v=0;v<pts.length;v++){pa[v*3]=pts[v][0];pa[v*3+1]=pts[v][1];pa[v*3+2]=pts[v][2];var c=tC(Math.sqrt(pts[v][0]*pts[v][0]+pts[v][1]*pts[v][1]+pts[v][2]*pts[v][2]));ca[v*3]=c.r;ca[v*3+1]=c.g;ca[v*3+2]=c.b}var g=new THREE.BufferGeometry();g.setAttribute('position',new THREE.BufferAttribute(pa,3));g.setAttribute('color',new THREE.BufferAttribute(ca,3));bgG.add(new THREE.Line(g,bgM))}

  // Layout
  var R1=3.5,R2=3,pos={};
  pos['s']=new THREE.Vector3(0,0,0);
  var patIds=['p1','p2','p3'];
  for(var pi=0;pi<3;pi++){var a=(pi/3)*Math.PI*2-Math.PI/2;pos[patIds[pi]]=new THREE.Vector3(Math.cos(a)*R1,Math.sin(a)*R1*.5,Math.sin(a)*R1*.6)}
  var deepMap={p1:['a','b','c'],p2:['d','e','f'],p3:['g','h','i']};
  for(var pi=0;pi<3;pi++){var pid=patIds[pi],pp=pos[pid],kids=deepMap[pid];var ba=Math.atan2(pp.z,pp.x);for(var k=0;k<3;k++){var ka=ba+(k-1)*.7;pos[kids[k]]=new THREE.Vector3(pp.x+Math.cos(ka)*R2,pp.y+(k-1)*.8,pp.z+Math.sin(ka)*R2)}}

  // Edges
  function edge(f,t,col,op){var mid=new THREE.Vector3((f.x+t.x)*.5,(f.y+t.y)*.5+.4,(f.z+t.z)*.5);var dx=t.x-f.x,dz=t.z-f.z,ln=Math.sqrt(dx*dx+dz*dz);if(ln>.1){mid.x+=(-dz/ln)*ln*.12;mid.z+=(dx/ln)*ln*.12}var cv=new THREE.QuadraticBezierCurve3(f,mid,t),pts=cv.getPoints(48),geo=new THREE.BufferGeometry().setFromPoints(pts);fgG.add(new THREE.Line(geo,new THREE.LineBasicMaterial({color:col,transparent:true,opacity:op,depthTest:false,depthWrite:false})));fgG.add(new THREE.Line(geo.clone(),new THREE.LineBasicMaterial({color:col,transparent:true,opacity:op*.4,blending:THREE.AdditiveBlending,depthTest:false,depthWrite:false})))}

  for(var pi=0;pi<3;pi++){edge(pos['s'],pos[patIds[pi]],0xE07010,isBl(patIds[pi])?.25:.45)}
  for(var pi=0;pi<3;pi++){var kids=deepMap[patIds[pi]];for(var k=0;k<3;k++){var bl=isBl(kids[k])||isBl(patIds[pi]);edge(pos[patIds[pi]],pos[kids[k]],0xCC1060,bl?.18:.35)}}

  // Cross-links
  for(var ci=0;ci<XLINKS.length;ci++){var xl=XLINKS[ci];if(!pos[xl.from]||!pos[xl.to])continue;var bl=isBl(xl.from)||isBl(xl.to);var f=pos[xl.from],t=pos[xl.to],mid=new THREE.Vector3((f.x+t.x)*.5,(f.y+t.y)*.5+1.2,(f.z+t.z)*.5);var cv2=new THREE.QuadraticBezierCurve3(f,mid,t),ap=cv2.getPoints(60);for(var si=0;si<ap.length-4;si+=7){var seg=ap.slice(si,Math.min(si+5,ap.length));fgG.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(seg),new THREE.LineBasicMaterial({color:0x8800CC,transparent:true,opacity:bl?.12:.30,depthTest:false,depthWrite:false})))}}

  // Spheres
  function dot(p,col,sz,op){var m=new THREE.Mesh(new THREE.SphereGeometry(sz,12,12),new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:op,depthTest:false}));m.position.copy(p);m.renderOrder=12;fgG.add(m);var gx=new THREE.Mesh(new THREE.SphereGeometry(sz*2.5,12,12),new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:op*.15,depthTest:false}));gx.position.copy(p);gx.renderOrder=11;fgG.add(gx)}
  dot(pos['s'],0xE07010,.15,.7);
  for(var pi=0;pi<3;pi++){dot(pos[patIds[pi]],0xCC1060,.10,isBl(patIds[pi])?.35:.6)}
  for(var i=0;i<13;i++){if(DEPTHS[i]!==2)continue;var id=IDS[i];var bl=isBl(id),q=isQ(LABELS[i]),st=isStr(LABELS[i]);dot(pos[id],q?0x8800CC:(st?0x44cc88:0x8844aa),.07,bl?.30:.55)}

  // Labels
  var labels=[],labR=document.getElementById('lr');
  for(var i=0;i<13;i++){
    var id=IDS[i],depth=DEPTHS[i],label=LABELS[i];
    var p2=pos[id];if(!p2)continue;
    var q2=depth===2&&isQ(label),s2=depth===2&&isStr(label),bl=isBl(id);
    var el=document.createElement('div');
    var cls='lbl';if(depth===0)cls+=' lbl-0';else if(depth===1)cls+=' lbl-1';else if(q2)cls+=' lbl-q';if(bl)cls+=' lbl-blur';
    el.className=cls;
    var pip=document.createElement('div');pip.className='pip '+(q2?'pip-q':(s2?'pip-s':'pip-'+depth));
    var span=document.createElement('span');span.textContent=label;
    if(q2&&!bl){var arrow=document.createElement('span');arrow.textContent=' \u2192';arrow.style.cssText='opacity:.5;font-size:9px;margin-left:2px';span.appendChild(arrow)}
    el.appendChild(pip);el.appendChild(span);labR.appendChild(el);
    labels.push({el:el,pos:p2,phase:i*.6});
  }

  // Done
  document.getElementById('ld').classList.add('done');
  setTimeout(function(){document.getElementById('nav').classList.add('show');document.getElementById('hint').classList.add('show');document.getElementById('cta').classList.add('show')},500);
  setTimeout(function(){if(!touched)document.getElementById('hint').classList.add('gone')},6000);

  // Hide debug after 5 seconds
  setTimeout(function(){dbg.style.display='none'},5000);

  // Label projection
  var pv=new THREE.Vector3();
  function upL(t){var W=innerWidth,H=innerHeight;for(var i=0;i<labels.length;i++){var it=labels[i];pv.copy(it.pos);pv.y+=Math.sin(t*.3+it.phase)*.05;pv.project(cam);if(pv.z>=1){it.el.style.opacity='0';continue}var sx=(pv.x*.5+.5)*W,sy=(-pv.y*.5+.5)*H;var dist=cam.position.distanceTo(it.pos);var op=1;if(dist>30)op*=Math.max(0,1-(dist-30)/15);if(dist<1.5)op*=Math.max(0,(dist-.5)/1);var eX=Math.min(sx/(W*.1),(W-sx)/(W*.1)),eY=Math.min(sy/(H*.08),(H-sy)/(H*.08));op*=Math.max(0,Math.min(1,Math.min(eX,eY)));it.el.style.opacity=op.toFixed(3);it.el.style.left=sx.toFixed(1)+'px';it.el.style.top=sy.toFixed(1)+'px'}}
  addEventListener('resize',function(){cam.aspect=innerWidth/innerHeight;cam.updateProjectionMatrix();R.setSize(innerWidth,innerHeight)});
  var clk=new THREE.Clock(),el2=0;
  (function anim(){requestAnimationFrame(anim);el2+=clk.getDelta();ct.update();upL(el2);R.render(sc,cam)})();

}); });

})();
</script>
</body>
</html>
